<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Juego de Geografía Europa - MAPpER V2</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Mapper specific overrides */
        #sidebar {
            background-color: #eef;
        }

        #mapper-controls {
            padding: 20px;
            background: #fff;
            border-bottom: 2px solid #ccc;
        }

        .current-target {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 10px;
            display: block;
        }

        .info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }

        .mapped-count {
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="map-wrapper">
            <div id="map-container-inner">
                <img id="map-img" src="map.jpg" alt="Mapa de Europa">
                <!-- Dots injected here -->
                <div id="message-box" class="hidden"></div>
            </div>
        </div>

        <div id="sidebar">
            <div id="mapper-controls">
                <h3>MAPPER V2</h3>
                <span class="info">Click the map to set position for:</span>
                <span id="target-name" class="current-target">Loading...</span>
                <div class="info">Category: <span id="target-cat">-</span></div>
                <div class="info">Progress: <span id="progress">0/0</span></div>

                <hr>
                <button onclick="skipPlace()">Skip</button>
                <button onclick="undoLast()">Undo</button>
                <button onclick="downloadJson()"
                    style="background: #4CAF50; color: white; border: none; padding: 10px; margin-top: 10px; cursor: pointer;">Download
                    JSON</button>
            </div>

            <div id="score-header">Mapped Places</div>
            <ul id="places-list">
                <!-- Mapped items will appear here -->
            </ul>
        </div>
    </div>

    <script>
        // Raw Data from places.json
        const rawData = {
            "Ríos (Obligatorio)": [
                "Vístula", "Don", "Rin", "Sena", "Loira", "Ródano", "Po", "Danubio"
            ],
            "Mares (Obligatorio)": [
                "Mar Blanco", "Mar del Norte", "Mar Báltico", "Mar Caspio", "Mar Mediterráneo Central", "Mar Negro", "Azov"
            ],
            "Otros (Obligatorio)": [
                "Islandia", "Cabo del Norte", "Pechora", "Montañas Urales", "Islas Feroe", "Montes Escandinavos",
                "Península Escandinava", "Volga", "Irlanda", "Gran Bretaña", "Ural", "Elbrus", "Los Alpes",
                "Mont Blanc", "Montes Cárpatos", "Monte Olimpo", "Creta", "Chipre", "Malta", "Sicilia",
                "Cerdeña", "Elba", "Córcega", "Golfo de León", "Islas Baleares", "Estrecho de Gibraltar",
                "Península Ibérica", "Meseta Central", "Tajo", "Ebro", "Golfo de Vizcaya", "Aneto",
                "Cuenca del Caspio", "Macizo Central", "Selva Negra", "Balcanes", "Mulhacén"
            ],
            "Otros que quiero poner": [
                "Cabo de Finisterre", "Cabo de St Vicente", "Mar Mediterráneo", "Océano Atlántico",
                "Océano Ártico", "Lago Ladoga", "Península Italiana", "Península Jutland"
            ],
            "Desconocidos": [
                "Meseta final", "Duina del norte", "Vosgos", "Etha" // Fixed typos manually based on prev json
            ]
        };

        // Flatten queue
        let queue = [];
        let mapped = [];

        for (let cat in rawData) {
            rawData[cat].forEach(name => {
                queue.push({ category: cat, name: name });
            });
        }

        let currentIndex = 0;

        // DOM Elements
        const mapImg = document.getElementById('map-img');
        const mapContainerInner = document.getElementById('map-container-inner');
        const targetNameDisp = document.getElementById('target-name');
        const targetCatDisp = document.getElementById('target-cat');
        const progressDisp = document.getElementById('progress');
        const placesList = document.getElementById('places-list');

        function updateUI() {
            if (currentIndex >= queue.length) {
                targetNameDisp.innerText = "ALL DONE!";
                targetCatDisp.innerText = "-";
                return;
            }
            const current = queue[currentIndex];
            targetNameDisp.innerText = current.name;
            targetCatDisp.innerText = current.category;
            progressDisp.innerText = `${currentIndex}/${queue.length}`;
        }

        function addMappedItemToList(place) {
            const li = document.createElement('li');
            li.className = 'place-item';
            li.innerHTML = `<strong>${place.name}</strong> <span style="font-size:0.8em">(${place.x?.toFixed(0)}, ${place.y?.toFixed(0)})</span>`;
            // Insert at top
            placesList.insertBefore(li, placesList.firstChild);
        }

        function showDot(xPct, yPct) {
            const dot = document.createElement('div');
            dot.className = 'dot active';
            dot.style.left = xPct + '%';
            dot.style.top = yPct + '%';
            dot.id = 'dot-' + currentIndex; // Track ID for undo
            mapContainerInner.appendChild(dot);

            // Label
            const label = document.createElement('div');
            label.className = 'place-label';
            label.innerText = queue[currentIndex].name;
            label.style.left = xPct + '%';
            label.style.top = yPct + '%';
            label.id = 'label-' + currentIndex;
            mapContainerInner.appendChild(label);
        }

        mapImg.addEventListener('click', (e) => {
            if (currentIndex >= queue.length) return;

            // Use exact same logic/structure as game.js to capture coordinates
            // This ensures "What you see is what you get"

            // We want to store RAW coordinates relative to the underlying image reference (3000x2152)
            // But verify visual placement immediately using %.

            const rect = mapImg.getBoundingClientRect();

            // Click relative to image element
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;

            if (clientX < 0 || clientX > rect.width || clientY < 0 || clientY > rect.height) return;

            // 1. Calculate Percentage (Visual Truth)
            const xPct = (clientX / rect.width) * 100;
            const yPct = (clientY / rect.height) * 100;

            // 2. Convert back to Reference Absolute (3000x2152) for storage
            // This allows game.js to load them and recalculate % or verify distance consistently.
            // game.js uses REF_WIDTH = 3000.
            const REF_WIDTH = 3000;
            const REF_HEIGHT = 2152;

            const rawX = (xPct / 100) * REF_WIDTH;
            const rawY = (yPct / 100) * REF_HEIGHT;

            // Store
            queue[currentIndex].x = Math.round(rawX);
            queue[currentIndex].y = Math.round(rawY);
            // Also store/cache pct? No, keep JSON clean with Abs coords like before, just better precision.

            showDot(xPct, yPct);
            addMappedItemToList(queue[currentIndex]);

            currentIndex++;
            updateUI();
        });

        window.skipPlace = function () {
            if (currentIndex >= queue.length) return;
            currentIndex++;
            updateUI();
        };

        window.undoLast = function () {
            if (currentIndex > 0) {
                currentIndex--;
                // Remove visual elements
                const dot = document.getElementById('dot-' + currentIndex);
                const label = document.getElementById('label-' + currentIndex);
                if (dot) dot.remove();
                if (label) label.remove();

                // Remove from list
                if (placesList.firstChild) placesList.removeChild(placesList.firstChild);

                // Clear data
                delete queue[currentIndex].x;
                delete queue[currentIndex].y;

                updateUI();
            }
        };

        window.downloadJson = function () {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(queue, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "places_with_coords.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        updateUI();

    </script>
</body>

</html>
