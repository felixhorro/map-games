<!DOCTYPE html>
<html>

<head>
    <title>Calibrate</title>
</head>

<body style="margin:0; padding:0;">
    <img id="map" src="../../src/political/map.jpg" style="max-width: none; cursor: crosshair;">
    <div id="output"
        style="position: fixed; top: 10px; right: 10px; background: white; border: 2px solid black; padding: 10px; font-size: 20px;">
        Clicks:<br>
    </div>
    <script>
        const mapImg = document.getElementById('map');
        const output = document.getElementById('output');
        const REF_WIDTH = 1200;
        const REF_HEIGHT = 978;

        mapImg.addEventListener('click', (e) => {
            const rect = mapImg.getBoundingClientRect();
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;
            const xPct = (clientX / rect.width) * 100;
            const yPct = (clientY / rect.height) * 100;
            const rawX = Math.round((xPct / 100) * REF_WIDTH);
            const rawY = Math.round((yPct / 100) * REF_HEIGHT);

            output.innerHTML += `X: ${rawX}, Y: ${rawY}<br>`;
        });
    </script>
</body>

</html>
