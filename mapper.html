<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Europe Map Coordinate Mapper</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #sidebar {
            width: 250px;
            background: #f0f0f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            flex-shrink: 0;
        }

        #map-container {
            flex: 1;
            position: relative;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #map-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            cursor: crosshair;
        }

        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .current-info {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        #output {
            margin-top: auto;
            white-space: pre;
            font-family: monospace;
            font-size: 10px;
            overflow: auto;
            height: 100px;
            border: 1px solid #999;
            display: none;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Mapper Tool</h2>
        <div class="current-info">
            <div>Category: <strong id="cat-disp">-</strong></div>
            <div>Place: <strong id="place-disp">-</strong></div>
            <div>Progress: <span id="progress-disp">0/0</span></div>
        </div>
        <button onclick="skipPlace()">Skip This Place</button>
        <button onclick="undoLast()">Undo Last</button>
        <button onclick="downloadJson()">Download JSON</button>
    </div>

    <div id="map-container">
        <img id="map-img" src="map.jpg" alt="Europe Map">
        <div id="dots-layer"></div>
    </div>

    <script>
        // Embedded original data
        const rawData = {
            "Ríos (Obligatorio)": [
                "Vístula",
                "Don",
                "Rin",
                "Sena",
                "Loira",
                "Ródano",
                "Po",
                "Danubio"
            ],
            "Mares (Obligatorio)": [
                "Mar Blanco",
                "Mar del Norte",
                "Mar Báltico",
                "Mar Caspio",
                "Mar Mediterráneo Central",
                "Mar Negro",
                "Azov"
            ],
            "Otros (Obligatorio)": [
                "Islandia",
                "Cabo del Norte",
                "Pechora",
                "Montañas Urales",
                "Islas Feroe",
                "Montes Escandinavos",
                "Península Escandinava",
                "Volga",
                "Irlanda",
                "Gran Bretaña",
                "Ural",
                "Elbrus",
                "Los Alpes",
                "Mont Blanc",
                "Montes Cárpatos",
                "Monte Olimpo",
                "Creta",
                "Chipre",
                "Malta",
                "Sicilia",
                "Cerdeña",
                "Elba",
                "Córcega",
                "Golfo de León",
                "Islas Baleares",
                "Estrecho de Gibraltar",
                "Península Ibérica",
                "Meseta Central",
                "Tajo",
                "Ebro",
                "Golfo de Vizcaya",
                "Aneto",
                "Cuenca del Caspio",
                "Macizo Central",
                "Selva Negra",
                "Balcanes",
                "Mulhacén"
            ],
            "Otros que quiero poner": [
                "Cabo de Finisterre",
                "Cabo de St Vicente",
                "Mar Mediterráneo",
                "Océano Atlántico",
                "Océano Ártico",
                "Lago Ladoga",
                "Península Italiana",
                "Península Jutland"
            ],
            "Desconocidos": [
                "Meseta final",
                "Duina del norte",
                "Vasgos",
                "Etha"
            ]
        };

        // Flatten logic
        let queue = [];
        let completed = [];

        // Initialize queue
        for (let cat in rawData) {
            rawData[cat].forEach(name => {
                queue.push({ category: cat, name: name });
            });
        }

        let currentIndex = 0;

        const mapImg = document.getElementById('map-img');
        const dotsLayer = document.getElementById('dots-layer');
        const catDisp = document.getElementById('cat-disp');
        const placeDisp = document.getElementById('place-disp');
        const progressDisp = document.getElementById('progress-disp');

        function updateUI() {
            if (currentIndex >= queue.length) {
                catDisp.innerText = "DONE!";
                placeDisp.innerText = "All places mapped.";
                progressDisp.innerText = `${currentIndex}/${queue.length}`;
                return;
            }
            const current = queue[currentIndex];
            catDisp.innerText = current.category;
            placeDisp.innerText = current.name;
            progressDisp.innerText = `${currentIndex + 1}/${queue.length}`;
        }

        function addDot(pctX, pctY) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = pctX + '%';
            dot.style.top = pctY + '%';
            dot.id = 'dot-' + currentIndex;
            dotsLayer.appendChild(dot);
        }

        function removeLastDot() {
            const dot = document.getElementById('dot-' + (currentIndex - 1));
            if (dot) dot.remove();
        }

        mapImg.addEventListener('click', (e) => {
            if (currentIndex >= queue.length) return;

            // e.offsetX / e.offsetY are relative to the padded visual border of the element
            // We want accurate coordinates relative to the image content.
            // Because object-fit: contain might leave empty space if we clicked the img element? 
            // Actually, click event on 'img' fires on the element box.
            // But with object-fit, the visual image might be smaller than the element box if we forced size?
            // Wait, max-width: 100% just constrains the box. The box size == visual image size usually.
            // Let's assume the click is valid on the visual image.

            const rect = mapImg.getBoundingClientRect();
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;

            // Calculate natural coordinates (original image pixels)
            const scaleX = mapImg.naturalWidth / mapImg.clientWidth;
            const scaleY = mapImg.naturalHeight / mapImg.clientHeight;

            const naturalX = Math.round(clientX * scaleX);
            const naturalY = Math.round(clientY * scaleY);

            // Store natural coordinates for generating the JSON
            queue[currentIndex].x = naturalX;
            queue[currentIndex].y = naturalY;

            // Display dot using percentages so they stay correct if window resizes
            const pctX = (clientX / mapImg.clientWidth) * 100;
            const pctY = (clientY / mapImg.clientHeight) * 100;

            addDot(pctX, pctY);
            currentIndex++;
            updateUI();
        });

        window.skipPlace = function () {
            if (currentIndex >= queue.length) return;
            // Mark as skipped? Or just leave x,y undefined?
            // Let's leave undefined.
            currentIndex++;
            updateUI();
        };

        window.undoLast = function () {
            if (currentIndex > 0) {
                removeLastDot();
                currentIndex--;
                delete queue[currentIndex].x;
                delete queue[currentIndex].y;
                updateUI();
            }
        };

        window.downloadJson = function () {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(queue, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "places_with_coords.json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        updateUI();

    </script>
</body>

</html>
