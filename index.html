<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Geografía de Europa</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="game-container">
        <div id="map-wrapper">
            <div id="map-container-inner">
                <img id="map-img" src="map.jpg" alt="Mapa de Europa">
                <!-- Dots injected here -->

                <!-- Keep message box separate or overlay on map? overlay is fine -->
                <div id="message-box" class="hidden"></div>
            </div>
        </div>

        <div id="sidebar">
            <div id="score-header">0/0 sitios encontrados</div>
            <ul id="places-list">
                <!-- List items -->
            </ul>
            <div id="sidebar-footer">
                <button id="btn-toggle-points">Mostrar puntos</button>
                <button id="btn-toggle-solve">Resolver</button>
            </div>
        </div>
    </div>
    <!-- Removed old UI overlay structures -->

    <script src="game.js"></script>
</body>

</html>
